<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>算数 神経衰弱</title>
<meta name="theme-color" content="#1D9E75">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#f0f4f0;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh}
#app{max-width:500px;margin:0 auto;padding:16px}
.logo{font-size:48px;text-align:center;padding-top:24px}
#screen-title{text-align:center;padding:12px 16px 6px;font-size:28px;font-weight:700;color:#1a2e1a;letter-spacing:0.05em}
#screen-sub{text-align:center;font-size:16px;color:#5a7a5a;margin-bottom:24px}
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.diff-btn{padding:20px 12px;border-radius:18px;border:2.5px solid #d4e8d4;background:#fff;cursor:pointer;text-align:center;touch-action:manipulation;min-height:100px}
.diff-btn:active{transform:scale(0.95)}
.diff-btn .d-icon{font-size:36px;margin-bottom:8px}
.diff-btn .d-name{font-size:17px;font-weight:700;color:#1a2e1a}
.diff-btn .d-desc{font-size:13px;color:#5a7a5a;margin-top:4px}
.diff-btn.selected{border-color:#1D9E75;background:#e8f7f1}
#start-btn{width:100%;padding:20px;border-radius:18px;border:none;background:#1D9E75;color:#fff;font-size:20px;font-weight:700;cursor:pointer;touch-action:manipulation;display:none;box-shadow:0 4px 20px rgba(29,158,117,0.35);margin-bottom:12px}
#ranking-btn{width:100%;padding:16px;border-radius:18px;border:2.5px solid #d4e8d4;background:#fff;color:#5a7a5a;font-size:16px;font-weight:600;cursor:pointer;touch-action:manipulation}
#game-screen{display:none}
#game-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
#back-btn{padding:12px 16px;border-radius:12px;border:2px solid #d4e8d4;background:#fff;color:#5a7a5a;font-size:15px;font-weight:600;cursor:pointer;touch-action:manipulation;flex-shrink:0}
#game-info{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.info-pill{background:#fff;border:2px solid #d4e8d4;border-radius:20px;padding:8px 14px;font-size:15px;color:#5a7a5a;white-space:nowrap}
.info-pill span{font-weight:700;color:#1a2e1a}
#target-bar{background:#fff;border:2.5px solid #1D9E75;border-radius:18px;padding:14px 16px;margin-bottom:10px;text-align:center;font-size:17px;color:#5a7a5a}
#target-bar b{color:#1D9E75;font-size:36px;font-weight:700;display:block;line-height:1.1}
#hint-bar{text-align:center;font-size:14px;color:#5a7a5a;margin-bottom:10px;padding:10px;background:#fff;border-radius:12px;border:2px solid #d4e8d4}
#progress-bar-wrap{height:8px;background:#d4e8d4;border-radius:4px;margin-bottom:12px;overflow:hidden}
#progress-bar{height:100%;background:#1D9E75;border-radius:4px;transition:width 0.3s;width:0%}
#card-grid{display:grid;gap:10px}
.card{border-radius:16px;background:#fff;border:2.5px solid #d4e8d4;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;user-select:none;overflow:hidden;transition:transform 0.12s}
.card:active{transform:scale(0.90)}
.card .card-back,.card .card-front{display:none;width:100%;height:100%;align-items:center;justify-content:center}
.card .card-back{background:linear-gradient(135deg,#1D9E75,#0F6E56);border-radius:14px}
.card-back-pat{width:55%;height:55%;border-radius:8px;border:3px solid rgba(255,255,255,0.35);display:flex;align-items:center;justify-content:center;font-size:22px}
.card-num{font-weight:700;color:#1a2e1a}
/* 状態クラスで一元管理 */
.card.s-down .card-back{display:flex}
.card.s-up   .card-front{display:flex}
.card.s-matched{background:#e8f7f1;border-color:#1D9E75}
.card.s-matched .card-front{display:flex}
.card.s-matched .card-num{color:#1D9E75}
.card.s-wrong{background:#fdf0f0;border-color:#e24b4a}
.card.s-wrong .card-front{display:flex}
.card.s-auto{background:#fff8e1;border-color:#FAC775}
.card.s-auto .card-front{display:flex}
.card.s-auto .card-num{color:#b8860b}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.anim-shake{animation:shake 0.35s}
.anim-pulse{animation:pulse 0.5s}
#result-screen{display:none;text-align:center;padding:24px 16px}
#result-icon{font-size:72px;margin-bottom:12px}
#result-title{font-size:28px;font-weight:700;margin-bottom:6px;color:#1a2e1a}
#result-sub{font-size:16px;color:#5a7a5a;margin-bottom:16px}
#score-big{font-size:56px;font-weight:700;color:#1D9E75;margin:8px 0}
.score-label{font-size:16px;color:#5a7a5a;margin-bottom:16px}
#result-stats{background:#fff;border-radius:18px;border:2px solid #d4e8d4;padding:16px;margin:0 0 16px;text-align:left}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;font-size:16px;color:#5a7a5a;border-bottom:1.5px solid #eef5ee}
.stat-row:last-child{border-bottom:none}
.stat-row b{color:#1a2e1a;font-size:18px}
#play-again-btn{width:100%;padding:20px;border-radius:18px;border:none;background:#1D9E75;color:#fff;font-size:18px;font-weight:700;cursor:pointer;margin-bottom:12px;box-shadow:0 4px 20px rgba(29,158,117,0.3);touch-action:manipulation}
#to-menu-btn{width:100%;padding:16px;border-radius:18px;border:2.5px solid #d4e8d4;background:#fff;color:#5a7a5a;font-size:16px;font-weight:600;cursor:pointer;touch-action:manipulation}
#ranking-screen{display:none;padding:12px}
#ranking-title{font-size:22px;font-weight:700;margin-bottom:16px;color:#1a2e1a;text-align:center}
.rank-tabs{display:flex;gap:8px;margin-bottom:14px;overflow-x:auto;padding-bottom:6px}
.rank-tab{padding:10px 18px;border-radius:20px;border:2px solid #d4e8d4;background:#fff;color:#5a7a5a;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;touch-action:manipulation;flex-shrink:0}
.rank-tab.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
#rank-list{list-style:none}
.rank-item{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:14px;background:#fff;border:2px solid #d4e8d4;margin-bottom:10px}
.rank-no{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;background:#eef5ee;color:#5a7a5a;flex-shrink:0}
.rank-no.gold{background:#FAC775;color:#412402}
.rank-no.silver{background:#D3D1C7;color:#2C2C2A}
.rank-no.bronze{background:#F5C4B3;color:#4A1B0C}
.rank-info{flex:1}
.rank-score{font-size:18px;font-weight:700;color:#1a2e1a}
.rank-detail{font-size:13px;color:#5a7a5a;margin-top:2px}
.rank-date{font-size:12px;color:#aac4aa}
.empty-rank{text-align:center;padding:40px;color:#aac4aa;font-size:16px;line-height:1.8}
#back-rank-btn{width:100%;padding:16px;border-radius:18px;border:2.5px solid #d4e8d4;background:#fff;color:#5a7a5a;font-size:16px;font-weight:600;cursor:pointer;margin-top:8px;touch-action:manipulation}
</style>
</head>
<body>
<div id="app">

<div id="title-screen">
  <div class="logo">🧮</div>
  <div id="screen-title">算数 神経衰弱</div>
  <div id="screen-sub">カードをめくって計算を完成させよう！</div>
  <div class="diff-grid">
    <div class="diff-btn" data-diff="easy" onclick="selectDiff(this)"><div class="d-icon">🌱</div><div class="d-name">かんたん</div><div class="d-desc">1〜5 · 8まい</div></div>
    <div class="diff-btn" data-diff="normal" onclick="selectDiff(this)"><div class="d-icon">⭐</div><div class="d-name">ふつう</div><div class="d-desc">1〜10 · 12まい</div></div>
    <div class="diff-btn" data-diff="hard" onclick="selectDiff(this)"><div class="d-icon">🔥</div><div class="d-name">むずかしい</div><div class="d-desc">1〜15 · 16まい</div></div>
    <div class="diff-btn" data-diff="expert" onclick="selectDiff(this)"><div class="d-icon">💎</div><div class="d-name">エキスパート</div><div class="d-desc">1〜20 · 20まい</div></div>
  </div>
  <button id="start-btn" onclick="startGame()">ゲームスタート 🎮</button>
  <button id="ranking-btn" onclick="showRanking()">🏆 ランキングを見る</button>
</div>

<div id="game-screen">
  <div id="game-header">
    <button id="back-btn" onclick="goMenu()">← もどる</button>
    <div id="game-info">
      <div class="info-pill">⏱ <span id="timer-disp">0</span>秒</div>
      <div class="info-pill">ミス <span id="miss-disp">0</span>回</div>
    </div>
  </div>
  <div id="target-bar">目標の数字<b id="target-num">?</b></div>
  <div id="hint-bar">足し算か引き算で <b id="hint-num">?</b> になるペアを見つけよう！</div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>
  <div id="card-grid"></div>
</div>

<div id="result-screen">
  <div id="result-icon">🎉</div>
  <div id="result-title">クリア！</div>
  <div id="result-sub">よくできました！</div>
  <div id="score-big">0</div>
  <div class="score-label">点</div>
  <div id="result-stats">
    <div class="stat-row">難易度 <b id="r-diff">—</b></div>
    <div class="stat-row">タイム <b id="r-time">—</b></div>
    <div class="stat-row">ミス数 <b id="r-miss">—</b></div>
  </div>
  <button id="play-again-btn" onclick="startGame()">もう一度あそぶ 🔄</button>
  <button id="to-menu-btn" onclick="goMenu()">メニューにもどる</button>
</div>

<div id="ranking-screen">
  <div id="ranking-title">🏆 ランキング</div>
  <div class="rank-tabs" id="rank-tabs"></div>
  <ul id="rank-list"></ul>
  <button id="back-rank-btn" onclick="goMenu()">メニューにもどる</button>
</div>

</div>
<script>
const DIFFS={
  easy:  {name:'かんたん',   max:5,  pairs:4,  cols:4, cardH:90},
  normal:{name:'ふつう',     max:10, pairs:6,  cols:4, cardH:84},
  hard:  {name:'むずかしい',  max:15, pairs:8,  cols:4, cardH:76},
  expert:{name:'エキスパート', max:20, pairs:10, cols:5, cardH:68},
};
const RANK_KEY='mathConc_v6';
let curDiff=null, target=0, cards=[], flipped=[], matched=0, misses=0;
let timerID=null, elapsed=0, busy=false, rankDiff='easy';

function selectDiff(el){
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
  curDiff=el.dataset.diff;
  document.getElementById('start-btn').style.display='block';
}

function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

// ★ カード生成：pairIdで必ず正しいペアを追跡
function generateCards(diff){
  const d=DIFFS[diff];
  const tryGen=(isAdd)=>{
    let t=undefined, pairs=[], tries=0;
    while(pairs.length<d.pairs && tries<8000){
      tries++;
      if(isAdd){
        const a=randInt(1,d.max), b=randInt(1,d.max);
        if(t===undefined) t=a+b;
        if(a+b===t && !pairs.some(p=>(p[0]===a&&p[1]===b)||(p[0]===b&&p[1]===a)))
          pairs.push([a,b]);
      } else {
        const a=randInt(2,d.max), b=randInt(1,a-1);
        if(t===undefined) t=a-b;
        if(a-b===t && !pairs.some(p=>p[0]===a&&p[1]===b))
          pairs.push([a,b]);
      }
    }
    return pairs.length>=d.pairs ? {t,pairs} : null;
  };
  let res=tryGen(Math.random()<0.5)||tryGen(true)||tryGen(false);
  if(!res){
    let t=3,pairs=[];
    for(let a=1;a<=d.max&&pairs.length<d.pairs;a++)
      for(let b=1;b<=d.max&&pairs.length<d.pairs;b++)
        if(a+b===t&&!pairs.some(p=>(p[0]===a&&p[1]===b)||(p[0]===b&&p[1]===a)))
          pairs.push([a,b]);
    res={t,pairs};
  }
  target=res.t;
  let slots=[];
  res.pairs.forEach((p,pi)=>{slots.push({num:p[0],pairId:pi});slots.push({num:p[1],pairId:pi});});
  for(let i=slots.length-1;i>0;i--){const j=randInt(0,i);[slots[i],slots[j]]=[slots[j],slots[i]];}
  return slots;
}

function cardEl(idx){return document.querySelector(`[data-idx="${idx}"]`);}

function setState(idx,state,anim){
  const el=cardEl(idx);
  if(!el)return;
  el.className=`card s-${state}`;
  el.style.height=DIFFS[curDiff].cardH+'px';
  if(anim==='shake'){el.classList.add('anim-shake');setTimeout(()=>el.classList.remove('anim-shake'),400);}
  if(anim==='pulse'){el.classList.add('anim-pulse');setTimeout(()=>el.classList.remove('anim-pulse'),600);}
}

function getState(idx){
  const el=cardEl(idx);
  if(!el)return'';
  const m=el.className.match(/s-(\w+)/);
  return m?m[1]:'';
}

function startGame(){
  if(!curDiff)return;
  const d=DIFFS[curDiff];
  const slots=generateCards(curDiff);
  matched=0;misses=0;elapsed=0;flipped=[];busy=false;
  cards=slots.map((s,i)=>({id:i,num:s.num,pairId:s.pairId}));

  show('game');
  document.getElementById('target-num').textContent=target;
  document.getElementById('hint-num').textContent=target;
  document.getElementById('miss-disp').textContent='0';
  document.getElementById('timer-disp').textContent='0';
  document.getElementById('progress-bar').style.width='0%';

  const grid=document.getElementById('card-grid');
  grid.style.gridTemplateColumns=`repeat(${d.cols},1fr)`;
  grid.innerHTML='';
  const fs=d.cols===5?28:32;
  cards.forEach((c,i)=>{
    const el=document.createElement('div');
    el.className='card s-down';
    el.style.height=d.cardH+'px';
    el.dataset.idx=i;
    el.innerHTML=`<div class="card-back"><div class="card-back-pat">✦</div></div><div class="card-front"><span class="card-num" style="font-size:${fs}px">${c.num}</span></div>`;
    el.addEventListener('click',()=>flipCard(i));
    grid.appendChild(el);
  });

  clearInterval(timerID);
  timerID=setInterval(()=>{elapsed++;document.getElementById('timer-disp').textContent=elapsed;},1000);
}

function flipCard(idx){
  if(busy)return;
  if(getState(idx)!=='down')return;
  if(flipped.length>=2)return;
  setState(idx,'up');
  flipped.push(idx);
  if(flipped.length===2)setTimeout(checkPair,100);
}

function numOK(i,j){
  const a=cards[i].num,b=cards[j].num;
  return(a+b===target)||(Math.abs(a-b)===target);
}

function checkPair(){
  busy=true;
  const[i,j]=flipped;

  if(numOK(i,j)){
    // ★ 数値が合った → 通常マッチ
    setState(i,'matched','pulse');
    setState(j,'matched','pulse');
    matched+=2;
    flipped=[];
    document.getElementById('progress-bar').style.width=(matched/cards.length*100)+'%';
    if(matched===cards.length){busy=false;setTimeout(endGame,600);return;}
    busy=false;
    // ★ 残り2枚のみ自動めくり、それ以外は何もしない
    checkLastTwo();
  } else {
    // ミス → 裏返す
    misses++;
    document.getElementById('miss-disp').textContent=misses;
    setState(i,'wrong','shake');
    setState(j,'wrong','shake');
    setTimeout(()=>{
      setState(i,'down');
      setState(j,'down');
      flipped=[];
      busy=false;
      checkLastTwo();
    },900);
  }
}

// ★ シンプル：残りが正確に2枚の時だけ自動めくり
function checkLastTwo(){
  const down=cards.filter(c=>getState(c.id)==='down');
  if(down.length!==2)return; // 2枚以外は何もしない

  busy=true;
  setTimeout(()=>{
    const[a,b]=down;
    setState(a.id,'up');
    setState(b.id,'up');
    flipped=[a.id,b.id];

    setTimeout(()=>{
      // 数値が合えば通常マッチ、合わなければpairIdで強制クリア
      if(numOK(a.id,b.id)){
        setState(a.id,'matched','pulse');
        setState(b.id,'matched','pulse');
      } else {
        // 最後の2枚だけ特例：pairIdに関係なく自動クリア
        setState(a.id,'auto','pulse');
        setState(b.id,'auto','pulse');
      }
      matched+=2;
      flipped=[];
      document.getElementById('progress-bar').style.width='100%';
      busy=false;
      setTimeout(endGame,600);
    },700);
  },400);
}

function endGame(){
  clearInterval(timerID);
  const d=DIFFS[curDiff];
  const score=Math.max(0,d.pairs*100+Math.max(0,300-elapsed)*2-misses*20);
  document.getElementById('r-diff').textContent=d.name;
  document.getElementById('r-time').textContent=elapsed+'秒';
  document.getElementById('r-miss').textContent=misses+'回';
  document.getElementById('score-big').textContent=score;
  document.getElementById('result-icon').textContent=score>=500?'🏆':score>=300?'🎉':score>=100?'👍':'😊';
  saveRank(curDiff,score,elapsed,misses);
  show('result');
}

function saveRank(diff,score,time,miss){
  let data={};
  try{data=JSON.parse(localStorage.getItem(RANK_KEY)||'{}');}catch(e){}
  if(!data[diff])data[diff]=[];
  data[diff].push({score,time,miss,date:new Date().toLocaleDateString('ja-JP')});
  data[diff].sort((a,b)=>b.score-a.score);
  data[diff]=data[diff].slice(0,10);
  try{localStorage.setItem(RANK_KEY,JSON.stringify(data));}catch(e){}
}

function showRanking(){
  let data={};
  try{data=JSON.parse(localStorage.getItem(RANK_KEY)||'{}');}catch(e){}
  const tabs=document.getElementById('rank-tabs');
  tabs.innerHTML='';
  Object.keys(DIFFS).forEach(k=>{
    const btn=document.createElement('button');
    btn.className='rank-tab'+(k===rankDiff?' active':'');
    btn.textContent=DIFFS[k].name;
    btn.onclick=()=>{rankDiff=k;showRanking();};
    tabs.appendChild(btn);
  });
  const list=document.getElementById('rank-list');
  const entries=data[rankDiff]||[];
  list.innerHTML=entries.length
    ?entries.map((e,i)=>`<li class="rank-item"><div class="rank-no ${i===0?'gold':i===1?'silver':i===2?'bronze':''}">${i+1}</div><div class="rank-info"><div class="rank-score">${e.score}点</div><div class="rank-detail">${e.time}秒 · ミス${e.miss}回</div></div><div class="rank-date">${e.date}</div></li>`).join('')
    :'<div class="empty-rank">まだ記録がありません<br>挑戦してみよう！</div>';
  show('ranking');
}

function goMenu(){clearInterval(timerID);show('title');}
function show(s){['title','game','result','ranking'].forEach(n=>{document.getElementById(n+'-screen').style.display=n===s?'block':'none';});}
</script>
</body>
</html>
